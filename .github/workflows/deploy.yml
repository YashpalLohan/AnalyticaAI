name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ------------------------------------------------------------
  # Deploy Backend → Render (free tier: 750 hours/month)
  # Setup: https://render.com → New Web Service → Connect GitHub
  # Add env vars in Render dashboard (not here — keep secrets safe)
  # ------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        # Get your deploy hook URL from:
        # Render Dashboard → Your Service → Settings → Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"

  # ------------------------------------------------------------
  # Deploy Frontend → Vercel (free for personal projects)
  # ------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token=$VERCEL_TOKEN
