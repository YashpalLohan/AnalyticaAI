name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ------------------------------------------------------------
  # Backend Tests
  # ------------------------------------------------------------
  backend-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: analytica
          POSTGRES_PASSWORD: analytica_password
          POSTGRES_DB: analytica_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run linter (ruff)
        run: |
          cd backend
          pip install ruff
          ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://analytica:analytica_password@localhost:5432/analytica_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret_key
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ------------------------------------------------------------
  # Frontend Tests
  # ------------------------------------------------------------
  frontend-test:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run linter (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npm run type-check

      - name: Build
        run: |
          cd frontend
          npm run build

  # ------------------------------------------------------------
  # Deploy (main branch only)
  # ------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy backend to Render
        run: echo "Trigger Render deploy hook via RENDER_DEPLOY_HOOK_URL secret"

      - name: Deploy frontend to Vercel
        run: echo "Add Vercel deploy step here"
        # Uncomment when Vercel CLI is configured:
        # run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
