version: "3.9"

services:

  # ----------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: analytica_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: analytica
      POSTGRES_PASSWORD: analytica_password
      POSTGRES_DB: analytica_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytica"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis — Queue & Cache
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: analytica_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # ChromaDB — Vector Database
  # ----------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: analytica_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"

  # ----------------------------------------------------------
  # FastAPI Backend
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: analytica_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://analytica:analytica_password@postgres:5432/analytica_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      STORAGE_PROVIDER: local          # use 'supabase' in production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - storage_data:/app/storage

  # ----------------------------------------------------------
  # Celery Worker — Background Jobs
  # ----------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: analytica_celery
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://analytica:analytica_password@postgres:5432/analytica_ai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      STORAGE_PROVIDER: local
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - storage_data:/app/storage

  # ----------------------------------------------------------
  # React Frontend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analytica_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  storage_data:
